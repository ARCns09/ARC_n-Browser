<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ARC_n Browser</title>
  <meta name="description" content="ARC_n — A lightweight, privacy-first desktop browser with native ad-blocking" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Tab Bar ──────────────────────────────────────────────── -->
  <div id="tab-bar">
    <div id="tabs-container">
      <!-- Tab elements injected by renderer.js -->
    </div>
    <button id="btn-new-tab" class="tab-btn" title="New Tab">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>

  <!-- ── Toolbar / Navigation Bar ─────────────────────────────── -->
  <div id="toolbar">
    <div class="nav-buttons">
      <button id="btn-back" class="nav-btn" title="Go Back" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-forward" class="nav-btn" title="Go Forward" disabled>
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6 3l5 5-5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-reload" class="nav-btn" title="Reload">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13.5 8A5.5 5.5 0 1 1 8 2.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M12 1.5L13.5 3 12 4.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button id="btn-home" class="nav-btn" title="Home">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 8l6-5.5L14 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M4 7v5.5a1 1 0 0 0 1 1h2.5V10h1v3.5H11a1 1 0 0 0 1-1V7" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
    <div class="omnibox-wrapper">
      <div class="omnibox-icon">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
          <path d="M9 9l3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
        </svg>
      </div>
      <input
        type="text"
        id="omnibox"
        placeholder="Search Google or enter a URL…"
        spellcheck="false"
        autocomplete="off"
      />
    </div>
    <!-- Bookmark Star -->
    <button id="btn-bookmark" class="nav-btn" title="Bookmark this page">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 1.5l1.85 3.75 4.15.6-3 2.93.71 4.12L8 10.88l-3.71 1.97.71-4.12-3-2.93 4.15-.6L8 1.5z"
              stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"
              class="star-path"/>
      </svg>
    </button>
    <!-- Download Button -->
    <button id="btn-downloads" class="nav-btn" title="Downloads">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M8 2v8M5 7l3 3 3-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M3 12h10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
      <span class="download-badge" id="download-badge" style="display:none;">0</span>
    </button>
  </div>

  <!-- ── Download Panel ───────────────────────────────────────── -->
  <div id="download-panel" class="download-panel hidden">
    <div class="download-panel-header">
      <span class="download-panel-title">Downloads</span>
      <button id="download-panel-close" class="download-panel-close-btn">×</button>
    </div>
    <div id="download-list" class="download-list">
      <!-- Download items injected by renderer.js -->
    </div>
    <div id="download-empty" class="download-empty">No downloads yet</div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
