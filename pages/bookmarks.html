<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks — ARC_n</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      color: #e0e0e0;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .page-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(135deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #e0e0e0;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s, transform 0.15s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
    }

    .btn:active { transform: scale(0.97); }

    .btn-danger {
      border-color: rgba(233,69,96,0.3);
      color: #e94560;
    }

    .btn-danger:hover {
      background: rgba(233,69,96,0.15);
      border-color: rgba(233,69,96,0.5);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 0.78rem;
    }

    .bookmark-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .bookmark-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      transition: background 0.2s;
    }

    .bookmark-item:hover {
      background: rgba(255,255,255,0.07);
    }

    .bookmark-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }

    .bookmark-info {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .bookmark-title {
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-url {
      font-size: 0.78rem;
      color: #8a8a9a;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-date {
      font-size: 0.75rem;
      color: #5a5a6e;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .bookmark-actions {
      display: flex;
      gap: 6px;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }

    .bookmark-item:hover .bookmark-actions {
      opacity: 1;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #5a5a6e;
    }

    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div class="page-header">
    <h1 class="page-title">⭐ Bookmarks</h1>
  </div>

  <div id="bookmarkList" class="bookmark-list"></div>

  <div id="emptyState" class="empty-state" style="display:none;">
    <div class="icon">🔖</div>
    <p>No bookmarks yet — click the ⭐ in the toolbar to save pages</p>
  </div>

  <script>
    const listEl = document.getElementById('bookmarkList');
    const emptyEl = document.getElementById('emptyState');

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function formatDate(ts) {
      return new Date(ts).toLocaleDateString([], {
        month: 'short', day: 'numeric', year: 'numeric'
      });
    }

    function renderBookmarks(bookmarks) {
      listEl.innerHTML = '';

      if (!bookmarks || bookmarks.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      bookmarks.forEach(bm => {
        const item = document.createElement('div');
        item.className = 'bookmark-item';

        item.innerHTML = `
          <div class="bookmark-icon">⭐</div>
          <div class="bookmark-info">
            <div class="bookmark-title">${escapeHtml(bm.title)}</div>
            <div class="bookmark-url">${escapeHtml(bm.url)}</div>
          </div>
          <div class="bookmark-date">${formatDate(bm.timestamp)}</div>
          <div class="bookmark-actions">
            <button class="btn btn-sm" data-action="visit">Visit</button>
            <button class="btn btn-sm btn-danger" data-action="delete">Remove</button>
          </div>
        `;

        item.querySelector('[data-action="visit"]').addEventListener('click', () => {
          window.arcnInternal.navigate(bm.url);
        });

        item.querySelector('[data-action="delete"]').addEventListener('click', async () => {
          await window.arcnInternal.removeBookmark(bm.url);
          loadBookmarks();
        });

        listEl.appendChild(item);
      });
    }

    async function loadBookmarks() {
      const bookmarks = await window.arcnInternal.getAllBookmarks();
      renderBookmarks(bookmarks);
    }

    loadBookmarks();
  </script>
</body>
</html>
